# Google Cloud Build configuration
# This file is placed in the root to ensure GitHub triggers can find it.
# It builds the backend from the ipl_influence_engine directory.

steps:
  # 1. Build the Docker image for the backend
  - name: 'gcr.io/cloud-builders/docker'
    args: 
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/ipl-influence-engine'
      - '-f'
      - 'Dockerfile' # Uses the root Dockerfile we just created
      - '.'

  # 2. Push the image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/ipl-influence-engine']

  # 3. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'ipl-agent' # Service name seen in GitHub trigger
      - '--image'
      - 'gcr.io/$PROJECT_ID/ipl-influence-engine'
      - '--region'
      - 'us-central1' # Region seen in GitHub trigger
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--port'
      - '8080'
      - '--memory'
      - '512Mi'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '1'
      - '--set-env-vars'
      - 'API_KEY=AIzaSyCo_3jymK3meF7ma1mbUP7TiMXv6JqoeUo'

images:
  - 'gcr.io/$PROJECT_ID/ipl-influence-engine'
